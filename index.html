<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Para Sayıcı">
<title>Para Sayıcı</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
  }

  header p {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }

  .toplam-bar {
    background: #1a1a1a;
    margin: 16px 16px 0;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #2a2a2a;
  }

  .toplam-label {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .toplam-deger {
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .toplam-deger .birim {
    font-size: 22px;
    color: #555;
    font-weight: 400;
    margin-left: 4px;
  }

  .detay-text {
    font-size: 11px;
    color: #555;
    margin-top: 8px;
    min-height: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .section {
    margin: 20px 16px 0;
  }

  .section-title {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .para-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .para-kart {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .para-kart:focus-within {
    border-color: #3a3a3a;
  }

  .para-ust {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .para-etiket {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .para-carpim {
    font-size: 11px;
    color: #555;
  }

  .para-input {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    width: 100%;
    text-align: center;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s;
  }

  .para-input:focus {
    border-color: #444;
  }

  .para-input::placeholder {
    color: #333;
    font-weight: 400;
  }

  .para-ara {
    font-size: 11px;
    color: #555;
    text-align: center;
    min-height: 14px;
  }

  /* Renk kodları */
  .c-200 { color: #a78bfa; }
  .c-100 { color: #60a5fa; }
  .c-50  { color: #f59e0b; }
  .c-20  { color: #34d399; }
  .c-10  { color: #f472b6; }
  .c-5   { color: #22d3ee; }
  .c-bozuk { color: #9ca3af; }

  .btn-temizle {
    display: block;
    width: calc(100% - 32px);
    margin: 20px 16px 0;
    padding: 14px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    color: #555;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .btn-temizle:active {
    background: #1a1a1a;
    transform: scale(0.98);
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <h1>💵 Para Sayıcı</h1>
  <p>Kasiyerler için hızlı para hesaplama</p>
</header>

<div class="toplam-bar">
  <p class="toplam-label">Toplam</p>
  <p class="toplam-deger" id="toplam">0<span class="birim"> TL</span></p>
  <p class="detay-text" id="detay">—</p>
</div>

<div class="section">
  <p class="section-title">Banknotlar</p>
  <div class="para-grid" id="grid-banknot"></div>
</div>

<div class="section">
  <p class="section-title">Bozuk Para</p>
  <div class="para-grid" id="grid-bozuk"></div>
</div>

<button class="btn-temizle" onclick="temizle()">Sıfırla</button>

<script>
const banknotlar = [
  { deger: 200, etiket: "200 TL", cls: "c-200" },
  { deger: 100, etiket: "100 TL", cls: "c-100" },
  { deger: 50,  etiket: "50 TL",  cls: "c-50"  },
  { deger: 20,  etiket: "20 TL",  cls: "c-20"  },
  { deger: 10,  etiket: "10 TL",  cls: "c-10"  },
  { deger: 5,   etiket: "5 TL",   cls: "c-5"   },
];
const bozuklar = [
  { deger: 1,    etiket: "1 TL",  cls: "c-bozuk" },
  { deger: 0.50, etiket: "50 Kr", cls: "c-bozuk" },
  { deger: 0.25, etiket: "25 Kr", cls: "c-bozuk" },
  { deger: 0.10, etiket: "10 Kr", cls: "c-bozuk" },
  { deger: 0.05, etiket: "5 Kr",  cls: "c-bozuk" },
  { deger: 0.01, etiket: "1 Kr",  cls: "c-bozuk" },
];

function createKart(item) {
  const div = document.createElement("div");
  div.className = "para-kart";
  div.innerHTML = `
    <div class="para-ust">
      <span class="para-etiket ${item.cls}">${item.etiket}</span>
      <span class="para-carpim" id="ara-${item.deger.toString().replace('.','_')}"></span>
    </div>
    <input class="para-input" type="number" min="0" placeholder="0"
      data-deger="${item.deger}"
      data-etiket="${item.etiket}"
      inputmode="numeric" pattern="[0-9]*" />
  `;
  div.querySelector("input").addEventListener("input", hesapla);
  return div;
}

document.getElementById("grid-banknot").append(...banknotlar.map(createKart));
document.getElementById("grid-bozuk").append(...bozuklar.map(createKart));

function hesapla() {
  const inputs = document.querySelectorAll(".para-input");
  let toplam = 0;
  let parcalar = [];

  inputs.forEach(inp => {
    const miktar = parseInt(inp.value) || 0;
    const deger = parseFloat(inp.dataset.deger);
    const key = inp.dataset.deger.replace('.','_');
    const araEl = document.getElementById("ara-" + key);
    if (miktar > 0) {
      const ara = miktar * deger;
      toplam += ara;
      parcalar.push(`${inp.dataset.etiket}×${miktar}`);
      if (araEl) araEl.textContent = fmt(ara) + " TL";
    } else {
      if (araEl) araEl.textContent = "";
    }
  });

  document.getElementById("toplam").innerHTML = fmt(toplam) + '<span class="birim"> TL</span>';
  document.getElementById("detay").textContent = parcalar.length ? parcalar.join("  +  ") : "—";
}

function fmt(n) {
  return n.toLocaleString("tr-TR", {
    minimumFractionDigits: n % 1 === 0 ? 0 : 2,
    maximumFractionDigits: 2
  });
}

function temizle() {
  document.querySelectorAll(".para-input").forEach(inp => inp.value = "");
  document.querySelectorAll(".para-carpim").forEach(el => el.textContent = "");
  document.getElementById("toplam").innerHTML = '0<span class="birim"> TL</span>';
  document.getElementById("detay").textContent = "—";
}
</script>
</body>
</html>
